# ─────────────────────────────────────────────────────────────────────────────
# PWIS Continuous Integration
# Runs on every push and pull request to main/dev branches.
#
# Jobs:
#   lint     — ruff + black check (fast, <30s)
#   test     — pytest with coverage gate (70% minimum)
#   data-quality — validate synthetic data schema and value ranges
#   build-check  — verify all scripts execute without error
# ─────────────────────────────────────────────────────────────────────────────

name: PWIS CI

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. LINT ───────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Run ruff (linting)
        run: ruff check models/ gis/ tests/

      - name: Run black (formatting check)
        run: black --check --diff models/ gis/ tests/

  # ── 2. TEST ───────────────────────────────────────────────────────────────
  test:
    name: Test Suite + Coverage
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=models \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          flags: unittests
          name: pwis-coverage
        continue-on-error: true   # Don't fail build if Codecov is unavailable

  # ── 3. DATA QUALITY ───────────────────────────────────────────────────────
  data-quality:
    name: Data Schema Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Generate synthetic data
        run: python data/generate_data.py

      - name: Validate data schemas
        run: |
          python - << 'PYEOF'
          import pandas as pd
          import sys

          errors = []

          # road_segments
          df = pd.read_csv("data/road_segments.csv")
          if not (df["condition_index"].between(1, 100)).all():
              errors.append("road_segments: condition_index out of range [1,100]")
          if df["segment_id"].duplicated().any():
              errors.append("road_segments: duplicate segment_ids found")
          if not df["segment_id"].notna().all():
              errors.append("road_segments: null segment_ids found")
          required_cols = ["segment_id","street_name","district","road_type",
                           "condition_index","daily_traffic_aadt","lat","lon"]
          missing = [c for c in required_cols if c not in df.columns]
          if missing:
              errors.append(f"road_segments: missing columns {missing}")

          # work_orders
          df = pd.read_csv("data/work_orders.csv")
          if df["work_order_id"].duplicated().any():
              errors.append("work_orders: duplicate work_order_ids found")

          # complaints
          df = pd.read_csv("data/complaints.csv")
          valid_severity = {"Low", "Medium", "High", "Critical"}
          bad = set(df["severity_reported"].unique()) - valid_severity
          if bad:
              errors.append(f"complaints: unexpected severity values {bad}")

          # budget
          df = pd.read_csv("data/budget_actuals.csv")
          pct_sum = df["preventive_pct"] + df["reactive_pct"] + df["capital_pct"]
          if (pct_sum > 101).any():
              errors.append("budget: pct columns sum > 100 in some rows")

          if errors:
              print("DATA QUALITY FAILURES:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)
          else:
              print("✓ All data quality checks passed")
          PYEOF

  # ── 4. BUILD CHECK ────────────────────────────────────────────────────────
  build-check:
    name: Smoke Test — Scripts Run End-to-End
    runs-on: ubuntu-latest
    needs: [test, data-quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install folium

      - name: Generate data
        run: python data/generate_data.py

      - name: Run prioritization model
        run: python models/prioritization.py

      - name: Run scenario engine
        run: python models/scenario_engine.py

      - name: Generate GIS maps
        run: python gis/map.py

      - name: Verify all outputs exist
        run: |
          python - << 'PYEOF'
          from pathlib import Path
          required = [
              "data/priority_scores.csv",
              "data/deferral_analysis.csv",
              "docs/map_condition.html",
              "docs/map_priority.html",
              "docs/map_complaints.html",
              "docs/map_executive.html",
          ]
          missing = [f for f in required if not Path(f).exists()]
          if missing:
              print(f"MISSING OUTPUTS: {missing}")
              import sys; sys.exit(1)
          print(f"✓ All {len(required)} expected outputs present")
          PYEOF

  # ── 5. NOTIFY (main branch only) ──────────────────────────────────────────
  notify:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Confirm PROD promotion readiness
        run: |
          echo "All CI gates passed on main branch."
          echo "PWIS is ready for PROD deployment."
          echo "Next step: Analytics Lead to trigger pbi-tools deployment."
